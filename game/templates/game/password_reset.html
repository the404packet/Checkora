{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Checkora</title>
    <link rel="stylesheet" href="{% static 'game/css/auth.css' %}">
    <link rel="icon" type="image/jpeg" href="{% static 'game/favicon.jpeg' %}">
</head>
<body>
    <!-- Back-to-home arrow -->
    <a href="{% url 'landing' %}" class="back-home" aria-label="Back to home">&larr; Home</a>

    <div class="header">
        <div class="logo-container">
            <img src="{% static 'game/checkora_icon_only.png' %}" class="logo-icon-img" alt="Checkora">
            <span class="logo-text">Checkora</span>
        </div>
        <p>Reset your password</p>
    </div>

    <div class="auth-card">
        <p id="cooldownTimer"
            style="
                text-align:center;
                color:#f0c040;
                margin-bottom:1rem;
                font-weight:600;
            ">
        </p>
        <form method="POST">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="form-errors">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_email">Email Address</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <div class="field-errors">
                        {{ form.email.errors }}
                    </div>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-gold">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            Remember your password? <a href="{% url 'login' %}">Sign In</a>
        </div>
    </div>

<script>

let remaining = 300;

const timer = document.getElementById('cooldownTimer');

{% if messages %}

    timer.innerText =
        `Cooldown: ${remaining}s`;

    const interval = setInterval(() => {

        remaining--;

        timer.innerText =
            `Cooldown: ${remaining}s`;

        if (remaining <= 0) {

            clearInterval(interval);

            timer.innerText = '';

        }

    }, 1000);

{% endif %}

</script>

</body>
</html>
