name: Issue Assignment Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: issue-assignment-monitor
  cancel-in-progress: false

permissions: {}

jobs:
  monitor:
    permissions:
      issues: write
      pull-requests: read

    runs-on: ubuntu-latest

    steps:
      - name: Monitor assigned issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const HOURS_LIMIT = 36;
            const REMINDER_HOURS = 24;
            const AVAILABLE_LABEL = "available";

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: "open",
                per_page: 100,
              }
            );

            console.log(`Checking ${issues.length} open issues`);

            for (const issue of issues) {
              try {
                if (issue.pull_request) continue;

                if (!issue.assignees || issue.assignees.length === 0) {
                  continue;
                }

                const events = await github.paginate(
                  github.rest.issues.listEvents,
                  {
                    owner,
                    repo,
                    issue_number: issue.number,
                    per_page: 100,
                  }
                );

                const assignedEvent = [...events]
                  .reverse()
                  .find(event => event.event === "assigned");

                if (!assignedEvent) {
                  continue;
                }

                const assignedAt = new Date(
                  assignedEvent.created_at
                );

                const hoursSinceAssignment =
                  (Date.now() - assignedAt.getTime()) /
                  (1000 * 60 * 60);

                const assigneeNames = issue.assignees
                  .map(user => user.login)
                  .join(",");

                const reminderComment =
                  "⏰ Reminder: Please open a PR within the next 12 hours or this issue may be automatically unassigned.";

                const comments = await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner,
                    repo,
                    issue_number: issue.number,
                    per_page: 100,
                  }
                );

                const reminderAlreadySent =
                  comments.some(comment =>
                    comment.body.includes(
                      "Please open a PR within the next 12 hours"
                    )
                  );
                
                const prs =
                    await github.rest.search.issuesAndPullRequests({
                        q: `repo:${owner}/${repo} is:pr is:open ${issue.number} in:body`
                    });

                const hasOpenPr = prs.data.total_count > 0;

                if (hasOpenPr) {
                    console.log(
                        `PR found for issue #${issue.number}`
                    );
                    continue;
                }

                if (
                  hoursSinceAssignment >= REMINDER_HOURS &&
                  hoursSinceAssignment < HOURS_LIMIT &&
                  !reminderAlreadySent
                ) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issue.number,
                    body: reminderComment,
                  });

                  console.log(
                    `Reminder sent for issue #${issue.number}`
                  );
                }

                if (hoursSinceAssignment < HOURS_LIMIT) {
                  continue;
                }

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body:
                    "⏰ Assignment removed because no pull request was opened within 36 hours. This issue is now available for reassignment.",
                });

                await github.rest.issues.removeAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: issue.assignees.map(
                    user => user.login
                  ),
                });

                const hasAvailableLabel =
                  issue.labels.some(
                    label => label.name === AVAILABLE_LABEL
                  );

                if (!hasAvailableLabel) {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issue.number,
                    labels: [AVAILABLE_LABEL],
                  });
                }

                console.log(
                  `Issue #${issue.number} unassigned from ${assigneeNames}`
                );

              } catch (error) {
                console.log(
                  `Error processing issue #${issue.number}:`,
                  error
                );
              }
            }
