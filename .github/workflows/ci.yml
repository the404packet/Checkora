# ♟️ Checkora CI/CD Pipeline
# Triggers:
#   • Every push to EVERY branch  → lint + compile + test + migrate-check + security
#   • Every PR targeting main      → same checks (required to merge)
#   • PRs with assignee mismatch   → auto-closed + CI skipped (pr-guardian.yml)
#   • Push/merge to main only      → all checks THEN deploy to Vercel
# Contributors see test results immediately after any push — no PR needed.
# -------------------------------------------------------------------
name: 🚀 Checkora CI/CD

on:
  push:
    # Run CI on every branch — feature branches, fix branches, forks, everything.
    # This means contributors get instant test feedback on their own branches.
    branches:
      - '**'
  pull_request:
    # Also run on PRs targeting main (required status checks for merge protection).
    branches: [main]

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions by default (least-privilege)
permissions:
  contents: read
  pull-requests: write   # allows posting CI summary comments on PRs
  issues: read             # PR guardian reads linked issue assignees
  deployments: read      # required for Vercel preview polling

env:
  DJANGO_SETTINGS_MODULE: core.settings
  # Dummy secret key — safe for CI, never used in production
  SECRET_KEY: "ci-insecure-k3y-f0r-t3sting-0nly-d0-n0t-use-1n-pr0d"
  PYTHON_VERSION: "3.12"

# ───────────────────────────────────────────────────────────────────
# JOB 0 — PR Guardian (assignee must match linked issue)
# ───────────────────────────────────────────────────────────────────
jobs:
  pr-guardian:
    name: 🛡️ PR Guardian
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      ci_allowed: ${{ steps.check.outputs.ci_allowed }}
      reason: ${{ steps.check.outputs.reason }}

    steps:
      - name: 🛡️ Check PR author is assigned to linked issue(s)
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const body = pr.body || '';
            const title = pr.title || '';
            const prNumber = pr.number;

            function parseIssueNumbers(text) {
              const nums = new Set();
              const patterns = [
                /\b(?:fix(?:e)?s?|close[sd]?|resolve[sd]?)\s+(?:[^\n#]*)?#(\d+)/gi,
                /fixes\s+#(\d+)/gi,
                /related issue[^\n]*#(\d+)/gi,
              ];
              for (const pattern of patterns) {
                for (const match of text.matchAll(pattern)) {
                  nums.add(parseInt(match[1], 10));
                }
              }
              return [...nums].sort((a, b) => a - b);
            }

            async function evaluatePr() {
              try {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner, repo, username: author,
                });
                if (perm.permission === 'admin' || perm.permission === 'maintain') {
                  return { allowed: true, reason: 'maintainer_bypass' };
                }
              } catch (e) {
                core.info(`Permission lookup: ${e.message}`);
              }

              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: prNumber, per_page: 100,
              });
              if (
                files.length > 0 &&
                files.every((f) => f.filename.startsWith('.github/') || f.filename === 'vercel.json')
              ) {
                return { allowed: true, reason: 'infra_only' };
              }

              if (/#\s*\(\s*issue\s+number\s*\)/i.test(body)) {
                return { allowed: false, reason: 'template_not_filled' };
              }

              const issueNumbers = parseIssueNumbers(`${title}\n${body}`);
              if (!issueNumbers.length) {
                return { allowed: false, reason: 'no_issue_linked' };
              }

              for (const num of issueNumbers) {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: num,
                });
                if (issue.pull_request) continue;
                const assignees = (issue.assignees || []).map((u) => u.login);
                if (!assignees.length) {
                  return { allowed: false, reason: `issue_${num}_unassigned` };
                }
                if (!assignees.includes(author)) {
                  return { allowed: false, reason: `issue_${num}_assignee_mismatch` };
                }
              }

              return { allowed: true, reason: 'ok' };
            }

            const { allowed, reason } = await evaluatePr();
            core.setOutput('ci_allowed', allowed ? 'true' : 'false');
            core.setOutput('reason', reason);
            core.info(`ci_allowed=${allowed} reason=${reason}`);

  # ───────────────────────────────────────────────────────────────────
  # JOB 1 — Python Lint (flake8)
  # ───────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint (flake8)
    runs-on: ubuntu-latest
    needs: [pr-guardian]
    if: |
      github.event_name != 'pull_request' ||
      needs.pr-guardian.result == 'skipped' ||
      needs.pr-guardian.outputs.ci_allowed == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-lint-${{ runner.os }}-

      - name: 📥 Install flake8
        run: pip install flake8 flake8-django

      - name: 🔍 Run flake8
        run: |
          flake8 . \
            --exclude=.venv,migrations,__pycache__,.git,game/engine/main.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503,W291,W293,W391,W292,E701,E402,F401,E231,E261,E302 \
            --count \
            --statistics

# ───────────────────────────────────────────────────────────────────
# JOB 2 — Compile C++ Engine
# ───────────────────────────────────────────────────────────────────
  compile-engine:
    name: ⚙️ Compile C++ Engine
    runs-on: ubuntu-latest
    outputs:
     engine_exists: ${{ steps.check_cpp.outputs.exists }}
    needs: [pr-guardian]
    if: |
      github.event_name != 'pull_request' ||
      needs.pr-guardian.result == 'skipped' ||
      needs.pr-guardian.outputs.ci_allowed == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Verify g++ availability
        run: g++ --version

      - name: 🔍 Check if C++ source exists
        id: check_cpp
        run: |
          if [ -f "game/engine/main.cpp" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ main.cpp found — proceeding with compilation"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ main.cpp not found — skipping compilation (non-fatal)"
          fi

      - name: ⚙️ Compile engine binary
        if: steps.check_cpp.outputs.exists == 'true'
        run: |
          g++ -O2 -std=c++17 \
              -Wall -Wextra -Wpedantic \
              game/engine/main.cpp \
              -o game/engine/main
          echo "✅ Compilation succeeded"
          file game/engine/main

      - name: 📤 Upload compiled binary as artifact
        if: steps.check_cpp.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: engine-binary-${{ github.sha }}
          path: game/engine/main
          retention-days: 7

# ───────────────────────────────────────────────────────────────────
# JOB 3 — Django Tests
# ───────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Django Tests
    runs-on: ubuntu-latest
    needs: [pr-guardian, lint, compile-engine]
    if: |
      (github.event_name != 'pull_request' ||
       needs.pr-guardian.result == 'skipped' ||
       needs.pr-guardian.outputs.ci_allowed == 'true') &&
      needs.lint.result == 'success' &&
      needs.compile-engine.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: 📥 Install project dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📥 Download compiled engine binary
        if: needs.compile-engine.outputs.engine_exists == 'true'
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e
        with:
          name: engine-binary-${{ github.sha }}
          path: game/engine/
      
      - name: 🔧 Mark engine binary as executable
        if: needs.compile-engine.outputs.engine_exists == 'true'
        run: chmod +x game/engine/main

      - name: 🧪 Run Django test suite
        id: run_tests
        run: |
          # set -o pipefail ensures test failures aren't swallowed by tee
          set -o pipefail
          python manage.py test game.tests --verbosity=2 --parallel 2>&1 | tee test_output.txt

      - name: 📋 Print test summary to Actions UI
        if: always()
        run: |
          echo "## 🧪 Test Results — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`  |  **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(FAIL|ERROR|OK|Ran [0-9]+ test)' test_output.txt || echo 'No summary line found' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q 'FAIL\|ERROR' test_output.txt; then
            echo "### ❌ Failed / Errored Tests" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -A5 'FAIL:\|ERROR:' test_output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📊 Upload full test log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true   # never let a failed upload kill the test job
        with:
          # ref_name can be '59/merge' for PRs — replace / to avoid invalid artifact name
          name: test-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: test_output.txt
          if-no-files-found: ignore
          retention-days: 14

# ───────────────────────────────────────────────────────────────────
# JOB 4 — Migration Check (detect missing migrations)
# ───────────────────────────────────────────────────────────────────
  migrate-check:
    name: 🗄️ Migration Check
    runs-on: ubuntu-latest
    needs: [pr-guardian, lint]
    if: |
      (github.event_name != 'pull_request' ||
       needs.pr-guardian.result == 'skipped' ||
       needs.pr-guardian.outputs.ci_allowed == 'true') &&
      needs.lint.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-migrate-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-migrate-${{ runner.os }}-

      - name: 📥 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Check for missing migrations
        run: |
          # Apply all existing migrations first (fresh CI DB)
          python manage.py migrate
          # Then check if any model changes exist without a migration file
          python manage.py makemigrations --check --dry-run
          echo "✅ No missing migrations detected"

# ───────────────────────────────────────────────────────────────────
# JOB 5 — Security Scan (pip-audit)
# ───────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan (pip-audit)
    runs-on: ubuntu-latest
    needs: [pr-guardian]
    if: |
      github.event_name != 'pull_request' ||
      needs.pr-guardian.result == 'skipped' ||
      needs.pr-guardian.outputs.ci_allowed == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-audit-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-audit-${{ runner.os }}-

      - name: 📥 Install pip-audit
        run: pip install pip-audit

      - name: 🔒 Run pip-audit security scan
        run: |
          pip install -r requirements.txt
          pip-audit \
            --requirement requirements.txt \
            --format=columns \
            --progress-spinner=off
        # Non-zero exit = vulnerabilities found → fails CI
        # Remove the next line if you want warnings-only mode:
        continue-on-error: false

# ───────────────────────────────────────────────────────────────────
# JOB 6 — SAST (Bandit)
# ───────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    needs: [pr-guardian, lint]
    if: |
      (github.event_name != 'pull_request' ||
       needs.pr-guardian.result == 'skipped' ||
       needs.pr-guardian.outputs.ci_allowed == 'true') &&
      needs.lint.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-sast-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-sast-${{ runner.os }}-

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan (fail on HIGH and MEDIUM)
        run: |
          bandit -r . --exclude ./.github -f txt -ll > bandit-report.txt || true
      
          echo "## SAST Results (Bandit)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 bandit-report.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
      
          # Fail on HIGH or MEDIUM severity issues
          if grep -qiE "severity: (high|medium)" bandit-report.txt; then
            echo "❌ High or Medium severity issues found — failing CI"
            exit 1
          else
            echo "✅ No high or medium severity issues"
          fi
          
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.run_id }}
          path: bandit-report.txt
          if-no-files-found: ignore
          retention-days: 7

# ───────────────────────────────────────────────────────────────────
# JOB 7 — Selenium E2E Tests
# ───────────────────────────────────────────────────────────────────
  selenium-tests:
    name: 🌐 Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: [pr-guardian, lint, test]
    if: |
      (github.event_name != 'pull_request' ||
       needs.pr-guardian.result == 'skipped' ||
       needs.pr-guardian.outputs.ci_allowed == 'true') &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: 📥 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 📦 Cache static files
        id: static-cache
        uses: actions/cache@v4
        with:
          path: staticfiles/
          key: static-${{ runner.os }}-${{ hashFiles('game/static/**', 'templates/**') }}

      - name: 📦 Collect static files
        if: steps.static-cache.outputs.cache-hit != 'true'
        run: python manage.py collectstatic --noinput

      - name: 🧪 Run Selenium E2E Tests
        id: selenium_test
        run: |
          set -o pipefail
          python manage.py test game.selenium_tests -v 2 2>&1 | tee selenium_output.txt

      - name: 📋 Print E2E test summary
        if: always()
        run: |
          echo "## 🌐 Selenium E2E Test Results — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test suites:** UITest (9 tests), NavigationTest (11 tests)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Output (last 30 lines)" >> $GITHUB_STEP_SUMMARY
          if [ -f selenium_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 selenium_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Selenium test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-output-${{ github.run_id }}
          path: selenium_output.txt
          if-no-files-found: ignore
          retention-days: 7

# ───────────────────────────────────────────────────────────────────
# NOTE: Deployment is handled natively by Vercel's GitHub integration.
# Vercel auto-deploys on every push to main and creates preview
# deployments for every PR — no separate deploy job needed here.
# Preview skips for assignee mismatch when GITHUB_TOKEN is set in Vercel
# (see vercel.json ignoreCommand and .github/scripts/pr_assignee_check.py).
# ───────────────────────────────────────────────────────────────────
